#---
spring.config.activate.on-profile=default
spring.application.name=clinicahaven
server.port=8090

#datasource
spring.jpa.database=h2
spring.datasource.driver-class-name=org.h2.Driver

#nombre base de datos
spring.datasource.url=jdbc:h2:file:./mydatabase
spring.datasource.username=sa
spring.datasource.password=

#consola de administracion de h2
spring.h2.console.enabled=true
#localhost:8090/h2
spring.h2.console.path=/h2

#Datos de prueba
spring.jpa.generate-ddl=true
#borrar la tabla cada vez
spring.jpa.hibernate.ddl-auto=create-drop
#spring.sql.init.mode=

#logging
#permite imprimir la query
logging.level.org,hibernate.SQL=DEBUG
#permite imprimir los parametros de la query
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#logging
#permite imprimir la query
logging.level.org,hibernate.SQL=DEBUG
#permite imprimir los parametros de la query
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#---
spring.config.activate.on-profile=prod
spring.application.name=clinicahaven
server.port=${PORT:8090}

#datasource
spring.jpa.database=h2
spring.datasource.driver-class-name=org.h2.Driver

#nombre base de datos - persistente en producción
spring.datasource.url=jdbc:h2:file:./proddb
spring.datasource.username=sa
spring.datasource.password=

#NO exponer H2 console en producción
spring.h2.console.enabled=false

#Mantener datos en producción
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

#logging reducido en producción
logging.level.org,hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN